name: Quality Gate

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run quality:gate

      - name: Dependency audit
        run: npm audit --audit-level=moderate
