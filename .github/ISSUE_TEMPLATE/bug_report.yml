name: Bug report
description: Report a reproducible QaAgent-Pro framework problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, auth state, customer data, or private reports.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and why is it incorrect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Node and QaAgent-Pro version
